services:
  db:
    image: postgres:15-alpine
    container_name: iran_db_container
    environment:
      POSTGRES_DB: guerre_iran_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iran-network

  app:
    image: php:8.2-apache
    container_name: iran_web_app
    depends_on:
      - db
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./config/apache.conf:/etc/apache2/sites-available/000-default.conf
    networks:
      - iran-network
    command: >
      sh -c "apt-get update && 
             apt-get install -y libpq-dev && 
             docker-php-ext-install pdo pdo_pgsql && 
             a2enmod rewrite && 
             apache2-foreground"

networks:
  iran-network:
    driver: bridge